# ══════════════════════════════════════════════════════════════════════
# Matrix Synapse + Element Web — matrix.bot32.app (hardened)
# ══════════════════════════════════════════════════════════════════════

# ── HTTP: ACME challenge + redirect to HTTPS ──
server {
    listen 80;
    server_name matrix.bot32.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — Element Web + Synapse Client API ──
server {
    listen 443 ssl;
    http2 on;
    server_name matrix.bot32.app;

    ssl_certificate     /etc/letsencrypt/live/matrix.bot32.app-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.bot32.app-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:MatrixSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Service-Worker-Allowed "/" always;

    # Hide nginx version
    server_tokens off;

    client_max_body_size 50M;

    # .well-known for Matrix client discovery
    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver": {"base_url": "https://matrix.bot32.app"}}';
    }

    # .well-known for Matrix federation discovery
    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "matrix.bot32.app:443"}';
    }

    # ── BLOCK Synapse Admin API from public access ──
    location ~* ^/_synapse/admin {
        return 403;
    }

    # Synapse Client API
    location ~* ^(/_matrix|/_synapse/client) {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://synapse:8008;
        proxy_pass $upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 600s;
        proxy_buffering       off;
    }

    # Element Web — root
    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://element-web:80;
        proxy_pass $upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTPS :8448 — Federation (server-to-server) ──
server {
    listen 8448 ssl;
    http2 on;
    server_name matrix.bot32.app;

    ssl_certificate     /etc/letsencrypt/live/matrix.bot32.app-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.bot32.app-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets off;
    server_tokens off;

    client_max_body_size 50M;

    # Block admin API on federation port too
    location ~* ^/_synapse/admin {
        return 403;
    }

    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://synapse:8008;
        proxy_pass $upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 600s;
        proxy_buffering       off;
    }
}
