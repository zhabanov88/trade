upstream backend {
    server bot32.app:5000;  # backend
}

upstream frontend {
    server bot32.app:8181;  # front
}

server {
    listen 5002;

    location / {
        proxy_pass http://bot32.app:8181/;  # Общий путь перенаправляется на front
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ^~ /chart/ {  # Улучшенный шаблон для route matching
        proxy_pass http://frontend;  # Frontend service
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://backend;  # Backend service
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}