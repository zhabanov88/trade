# ── Upstream пулы ─────────────────────────────────────────────────────
upstream backend     { server charts-app:5000; }
upstream frontend    { server hl_tradingview_test:8080; }
upstream open_webui  { server open-webui:8080; }
upstream ollama_api  { server ollama:11434; }
upstream litellm_api { server litellm:4000 down; }

# ══════════════════════════════════════════════════════════════════════
# bot32.app HTTPS :443
# ══════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    http2 on;
    server_name bot32.app;

    ssl_certificate     /etc/letsencrypt/live/bot32.app-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot32.app-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_read_timeout    600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
    }
    location ^~ /chart/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 600s;
        proxy_buffering       off;
    }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    server_name bot32.app;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════
# bot32-ingest-ws WSS :8765
# ══════════════════════════════════════════════════════════════════════
server {
    listen 8765 ssl;
    http2 off;
    server_name bot32.app;

    ssl_certificate     /etc/letsencrypt/live/bot32.app-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot32.app-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    location / {
        proxy_pass http://bot32-ingest-ws:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 60s;
    }
}

