# ══════════════════════════════════════════════════════════════════════
# ✅ ДОБАВЛЕНО: AI сервисы с HTTPS (по аналогии с CloudBeaver)
# ══════════════════════════════════════════════════════════════════════

# ── Open WebUI HTTPS :8083 ────────────────────────────────────────────
# Веб-интерфейс для чата с локальными моделями
# Доступ: https://bot32.trade:8083
server {
    listen 8083 ssl;
    server_name bot32.trade;

    ssl_certificate     /etc/letsencrypt/live/bot32.trade/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot32.trade/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Увеличенный размер тела для загрузки документов в RAG
    client_max_body_size 100M;

    location / {
        proxy_pass http://open_webui;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket — критично для стриминга ответов
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";

        # Длинные таймауты для генерации (особенно 70B моделей)
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  600s;

        proxy_redirect off;
        proxy_buffering off;    # стриминг — не буферизировать
    }
}

# ── Ollama API HTTPS :11436 ───────────────────────────────────────────
# Прямой доступ к Ollama REST API снаружи
# Используется llm-router.js при настройке провайдера Ollama
# Доступ: https://bot32.trade:11436
server {
    listen 11436 ssl;
    server_name bot32.trade;

    ssl_certificate     /etc/letsencrypt/live/bot32.trade/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot32.trade/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    auth_basic           "Ollama API — Trading Platform";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://ollama_api;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";  # keep-alive для больших моделей

        proxy_read_timeout    600s;  # 10 минут — для медленных CPU инференсов
        proxy_send_timeout    600s;
        proxy_connect_timeout  600s; 

        proxy_buffering off;    # стриминг ответов токен за токеном
    }
}

# ── LiteLLM API HTTPS :4002 ───────────────────────────────────────────
# Единый OpenAI-совместимый прокси для всех LLM провайдеров
# В llm-router.js: provider=openai_compat, baseUrl=https://bot32.trade:4002
# Доступ: https://bot32.trade:4002
server {
    listen 4002 ssl;
    server_name bot32.trade;

    ssl_certificate     /etc/letsencrypt/live/bot32.trade/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot32.trade/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Увеличен лимит тела — LiteLLM может получать большие контексты
    client_max_body_size 10M;

    location / {
        proxy_pass http://litellm_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  600s;

        proxy_buffering off;    # стриминг токенов
    }
}