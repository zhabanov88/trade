# ── Upstream пулы ─────────────────────────────────────────────────────
upstream backend    { server charts-app:5000; }
upstream frontend   { server hl_tradingview_test:8080; }

# ✅ ДОБАВЛЕНО: upstreams для AI сервисов
upstream open_webui { server open-webui:8080; }      # Open WebUI контейнер
upstream ollama_api { server ollama:11434; }          # Ollama LLM движок
upstream litellm_api { server litellm:4000; }         # LiteLLM прокси

# ══════════════════════════════════════════════════════════════════════
# HTTP → HTTPS редиректы
# ══════════════════════════════════════════════════════════════════════

# ── Let's Encrypt renewal + HTTP редиректы ────────────────────────────
server {
    listen 80;
    server_name bot32.trade;

    # ACME challenge для certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host:5443$request_uri;
    }
}

server {
    listen 8978;
    server_name bot32.trade;
    return 301 https://$host:8979$request_uri;
}

server {
    listen 8123;
    server_name bot32.trade;
    return 301 https://$host:8124$request_uri;
}

# ✅ ДОБАВЛЕНО: HTTP → HTTPS редиректы для AI сервисов 
server {
    listen 6089;
    server_name bot32.trade;
    return 301 https://$host:8083$request_uri;
}

server {
    listen 11435;
    server_name bot32.trade;
    return 301 https://$host:11436$request_uri;
}

server {
    listen 4001;
    server_name bot32.trade;
    return 301 https://$host:4002$request_uri;
}

# ══════════════════════════════════════════════════════════════════════
# HTTPS сервисы — основное приложение
# ══════════════════════════════════════════════════════════════════════

# ── Основное приложение HTTPS :5443 ──────────────────────────────────
server {
    listen 5443 ssl;
    server_name bot32.trade;

    ssl_certificate     /etc/letsencrypt/live/bot32.trade/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot32.trade/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_read_timeout    300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
    }

    location ^~ /chart/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 600s;
        proxy_buffering       off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

