# ── Open WebUI HTTPS :8083 ────────────────────────────────────────────
server {
    listen 8083 ssl;
    server_name bot32.app;

    ssl_certificate     /etc/ssl/certs/1.crt;
    ssl_certificate_key /etc/ssl/private/1.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 100M;

    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://open-webui:8080;
        proxy_pass $upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 600s;

        proxy_redirect off;
        proxy_buffering off;
    }
}

# ── Ollama API HTTPS :11436 ───────────────────────────────────────────
server {
    listen 11436 ssl;
    server_name bot32.app;

    ssl_certificate     /etc/ssl/certs/1.crt;
    ssl_certificate_key /etc/ssl/private/1.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    auth_basic           "Ollama API — Trading Platform";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://ollama:11434;
        proxy_pass $upstream;

        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 600s;

        proxy_buffering off;
    }
}

